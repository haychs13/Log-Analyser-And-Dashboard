<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Log Analyser{% endblock %} — CyberDash</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ── Navigation ────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold text-danger" href="{{ url_for('dashboard') }}">
      <i class="bi bi-shield-exclamation me-2"></i>CyberDash
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
             href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'alerts_page' %}active{% endif %}"
             href="{{ url_for('alerts_page') }}">
            <i class="bi bi-bell me-1"></i>Alerts
          </a>
        </li>
      </ul>
      <button id="btn-reanalyze" class="btn btn-sm btn-outline-warning">
        <i class="bi bi-arrow-clockwise me-1"></i>Re-analyse
      </button>
    </div>
  </div>
</nav>

<!-- ── Main content ───────────────────────────────────────────────────── -->
<main class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────────── -->
<footer class="text-center text-muted small py-3 border-top border-secondary">
  CyberDash &mdash; Cybersecurity Log Analyser
  {% if data is defined and data.analysed_at is defined %}
    &mdash; Last analysed: {{ data.analysed_at[:19] | replace("T", " ") }}
  {% endif %}
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmR0FeM6jz6gkE2ks2wU5h9QLsJ"
        crossorigin="anonymous"></script>

<!-- Re-analyse button -->
<script>
document.getElementById("btn-reanalyze").addEventListener("click", async () => {
  const btn = document.getElementById("btn-reanalyze");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Analysing…';
  try {
    const res = await fetch("/api/analyze", { method: "POST" });
    const json = await res.json();
    if (json.status === "ok") window.location.reload();
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Re-analyse';
  }
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
